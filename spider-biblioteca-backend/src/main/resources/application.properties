spring.application.name=spider-biblioteca
server.port=8080

# ============================================================
# DATASOURCE - MySQL con XAMPP
# Si tu root no tiene contraseña, deja spring.datasource.password=
# Si tiene contraseña, ponla aqui
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3307/spider_biblioteca?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ddl-auto=update: crea las tablas si no existen y las actualiza
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
jwt.secret=SpiderBiblioteca2024SecretKeyForJWT32CharsMin!
jwt.expiration=86400000

# ============================================================
# LOG
# ============================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.joel.spiderbiblioteca=INFO
